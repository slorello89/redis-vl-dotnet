name: ci

on:
  push:
    branches:
      - main
      - ralph/**
  pull_request:

jobs:
  docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install docs dependencies
        run: npm ci

      - name: Validate Antora site
        run: npm run docs:validate

  examples:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Build example projects
        run: npm run examples:build

  build-and-test:
    runs-on: ubuntu-latest
    needs:
      - docs
      - examples
    services:
      redis-stack:
        image: redis:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    env:
      REDIS_VL_REDIS_URL: localhost:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore redis-vl-dotnet.sln

      - name: Build
        run: dotnet build redis-vl-dotnet.sln --no-restore

      - name: Test
        run: dotnet test redis-vl-dotnet.sln --no-build --verbosity normal
