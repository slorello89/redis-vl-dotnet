name: ci

on:
  push:
    branches:
      - main
      - ralph/**
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      redis-stack:
        image: redis/redis-stack-server:7.4.0-v8
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    env:
      REDIS_VL_REDIS_URL: localhost:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore redis-vl-dotnet.sln

      - name: Build
        run: dotnet build redis-vl-dotnet.sln --no-restore

      - name: Test
        run: dotnet test redis-vl-dotnet.sln --no-build --verbosity normal
