name: nuget-release

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nuget-release
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    services:
      redis-stack:
        image: redis:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    env:
      REDIS_VL_REDIS_URL: localhost:6379

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore solution
        run: dotnet restore redis-vl-dotnet.sln

      - name: Build solution
        run: dotnet build redis-vl-dotnet.sln --configuration Release --no-restore

      - name: Test solution
        run: dotnet test redis-vl-dotnet.sln --configuration Release --no-build --verbosity normal

      - name: Pack publishable projects
        shell: bash
        run: |
          projects=(
            "src/RedisVL/RedisVL.csproj"
            "src/RedisVL.Vectorizers.Abstractions/RedisVL.Vectorizers.Abstractions.csproj"
            "src/RedisVL.Vectorizers.OpenAI/RedisVL.Vectorizers.OpenAI.csproj"
            "src/RedisVL.Vectorizers.HuggingFace/RedisVL.Vectorizers.HuggingFace.csproj"
            "src/RedisVL.Rerankers.Abstractions/RedisVL.Rerankers.Abstractions.csproj"
            "src/RedisVL.Rerankers.Cohere/RedisVL.Rerankers.Cohere.csproj"
          )

          mkdir -p "${{ runner.temp }}/packages"

          for project in "${projects[@]}"; do
            dotnet pack "$project" --configuration Release --no-build --output "${{ runner.temp }}/packages"
          done

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: |
            ${{ runner.temp }}/packages/*.nupkg
            ${{ runner.temp }}/packages/*.snupkg

      - name: Publish packages to NuGet
        run: dotnet nuget push "${{ runner.temp }}/packages/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
